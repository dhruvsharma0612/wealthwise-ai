services:
  postgres:
    image: postgres:16-alpine
    container_name: wealthwise_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealthwise
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: wealthwise_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wealthwise_redis
    restart: unless-stopped
    command: redis-server --requirepass redissecret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redissecret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealthwise_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://wealthwise:secret@postgres:5432/wealthwise_db
      - REDIS_URL=redis://:redissecret@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealthwise_frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    depends_on:
      - backend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: wealthwise_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
